<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#071a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#36c2ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1d2b3f" stroke-width="1" opacity="0.5">
    <path d="M0 90 H1280 M0 250 H1280"/>
    <path d="M860 0 V340 M1060 0 V340"/>
  </g>
  <!-- signal waves -->
  <g fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.85" filter="url(#glow)">
    <path d="M980 200 q30 -55 60 0 q30 55 60 0 q30 -55 60 0 q30 55 60 0"/>
    <path d="M980 235 q30 -35 60 0 q30 35 60 0 q30 -35 60 0 q30 35 60 0" opacity="0.5"/>
  </g>
  <!-- antenna icon -->
  <g transform="translate(1180,95)" stroke="url(#accent)" stroke-width="4" fill="none" filter="url(#glow)">
    <circle cx="0" cy="0" r="6" fill="#3DDC84" stroke="none"/>
    <path d="M-18 -18 a26 26 0 0 1 36 0 M-32 -32 a46 46 0 0 1 64 0"/>
    <path d="M-18 18 a26 26 0 0 0 36 0 M-32 32 a46 46 0 0 0 64 0"/>
  </g>

  <text x="64" y="120" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="-1">Android&#160;GKI&#160;WiFi&#160;Injection</text>
  <text x="66" y="166" fill="url(#accent)" font-size="25" font-weight="600">Monitor mode &amp; 802.11 packet injection on a stock Android kernel — no reflash</text>
  <text x="66" y="205" fill="#9fb3c8" font-size="18">Out-of-tree cfg80211 · mac80211 · rtl8xxxu loadable modules &#160;|&#160;  RTL8188FU OTG  &#160;|&#160;  Flutter app</text>

  <!-- tech chips -->
  <g font-size="16" font-weight="600">
    <g transform="translate(66,250)">
      <rect width="158" height="34" rx="17" fill="#11243a" stroke="#234"/><text x="79" y="22" fill="#cfe8ff" text-anchor="middle">Clang 14 · LTO/CFI</text></g>
    <g transform="translate(236,250)">
      <rect width="150" height="34" rx="17" fill="#11243a" stroke="#234"/><text x="75" y="22" fill="#cfe8ff" text-anchor="middle">GKI 5.15 · android13</text></g>
    <g transform="translate(398,250)">
      <rect width="132" height="34" rx="17" fill="#11243a" stroke="#234"/><text x="66" y="22" fill="#cfe8ff" text-anchor="middle">aircrack-ng</text></g>
    <g transform="translate(542,250)">
      <rect width="150" height="34" rx="17" fill="#11243a" stroke="#234"/><text x="75" y="22" fill="#cfe8ff" text-anchor="middle">Magisk · root</text></g>
    <g transform="translate(704,250)">
      <rect width="120" height="34" rx="17" fill="#11243a" stroke="#234"/><text x="60" y="22" fill="#cfe8ff" text-anchor="middle">GPL-2.0</text></g>
  </g>
</svg>
